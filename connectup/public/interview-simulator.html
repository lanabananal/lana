<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectUP — Interview Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pu:#c400ff;--pu2:#e1a7f1;--bg:#0a0010;--bg2:#1a0d22;--bg3:#24143a;--tx:#f5eeff;--tx2:#b89cc8;--tx3:#7a5e8a;--bd:#3d1f52;--card:#1e1029;--ok:#4ade80;--bad:#f87171;--warn:#fbbf24}
body{font-family:'DM Sans',sans-serif;background:#000;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px}
.app{width:100%;max-width:560px;background:var(--bg);border-radius:16px;overflow:hidden;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:8px}
.step-pills{display:flex;gap:4px}
.sp{width:18px;height:4px;border-radius:2px;background:var(--bd);transition:all .3s}
.sp.done{background:var(--pu)}
.sp.active{background:var(--pu);opacity:.45}
.time-badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg3);color:var(--tx3);border:1px solid var(--bd)}
.screen{flex:1;overflow-y:auto}
.cover{min-height:calc(100vh - 57px);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:40px 24px;text-align:center}
.cover-bg{position:absolute;inset:0;background-image:url('/Gem.png');background-size:cover;background-position:center top}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,0,16,.3) 0%,rgba(10,0,16,.2) 30%,rgba(10,0,16,.6) 65%,rgba(10,0,16,.95) 100%)}
.corner{position:absolute;width:70px;height:70px;border-color:rgba(196,0,255,.3);border-style:solid;z-index:2}
.c-tl{top:16px;left:16px;border-width:1px 0 0 1px}.c-tr{top:16px;right:16px;border-width:1px 1px 0 0}
.c-bl{bottom:16px;left:16px;border-width:0 0 1px 1px}.c-br{bottom:16px;right:16px;border-width:0 1px 1px 0}
.cover-content{position:relative;z-index:3;width:100%}
.cover-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(225,167,241,.9);margin-bottom:14px;font-weight:400}
.cover-title{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1.1;color:#f5eeff;margin-bottom:6px;letter-spacing:-.02em;text-shadow:0 2px 30px rgba(0,0,0,.9)}
.cover-sub{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1.1;color:#c400ff;margin-bottom:28px;letter-spacing:-.02em;text-shadow:0 0 40px rgba(196,0,255,.8)}
.cover-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(196,0,255,.7),transparent);margin:0 auto 28px}
.cover-btn{padding:16px 52px;border-radius:50px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;cursor:pointer;border:none;background:linear-gradient(135deg,#c400ff,#7000cc);color:#fff;box-shadow:0 0 40px rgba(196,0,255,.5);transition:transform .15s,box-shadow .15s}
.cover-btn:hover{transform:scale(1.05);box-shadow:0 0 60px rgba(196,0,255,.7)}
.cover-hint{font-size:11px;color:rgba(225,167,241,.45);margin-top:14px;font-style:italic;letter-spacing:.04em}
.body-screen{padding:28px 24px}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--pu);margin-bottom:14px;font-weight:500}
.greeting{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1.3;margin-bottom:18px;color:var(--tx)}
.greeting span{color:var(--pu2)}
.body-text{font-size:15px;color:var(--tx2);line-height:1.85}
.body-text p{margin-bottom:18px}
.body-text p:last-child{margin-bottom:0}
.hl{color:var(--pu2);font-style:italic}
.divider{border:none;border-top:1px solid var(--bd);margin:22px 0}
.name-label{font-size:13px;color:var(--tx2);margin-bottom:10px}
.name-wrap{display:flex;gap:10px;align-items:center}
.name-wrap input{flex:1;padding:13px 16px;border-radius:12px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.name-wrap input:focus{border-color:var(--pu)}
.name-wrap input::placeholder{color:var(--tx3)}
.btn-start{padding:13px 22px;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;background:var(--pu);color:#fff;border:none;transition:all .15s;white-space:nowrap;letter-spacing:.02em}
.btn-start:hover{background:#a800d9}
.btn-start:disabled{opacity:.35;cursor:default}
.comfort{font-size:12px;color:var(--tx3);font-style:italic;margin-top:14px;min-height:18px}
.module-screen{padding:20px}
.mod-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:16px;font-weight:500;text-align:center}
.dark-card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px}
.sec-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px;font-weight:500}
.prog-bar{height:4px;border-radius:2px;background:var(--bd);overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--pu);transition:width .4s}
.prog-time{font-size:12px;color:var(--tx3);text-align:right;margin-top:4px;margin-bottom:12px;font-variant-numeric:tabular-nums}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:10px;font-size:13px;cursor:pointer;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);transition:all .15s;font-family:'DM Sans',sans-serif}
.btn:hover{border-color:var(--pu);color:var(--tx)}
.btn-main{background:var(--pu);color:#fff;border:none;font-weight:500}
.btn-main:hover{background:#a800d9;color:#fff}
.btn:disabled{opacity:.35;cursor:default}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;display:inline-block}
.pill-pu{background:#c400ff18;color:var(--pu2);border:1px solid #c400ff33}
.pill-ok{background:#0d2b1a;color:var(--ok);border:1px solid #166534}
.pill-warn{background:#2b1a00;color:var(--warn);border:1px solid #854f0b}
.pill-bad{background:#2d0a0a;color:var(--bad);border:1px solid #7f1d1d}
.pill-gray{background:var(--bg3);color:var(--tx3);border:1px solid var(--bd)}
.breath-wrap{display:flex;justify-content:center;align-items:center;margin:16px auto;width:130px;height:130px;position:relative}
.breath-ring{width:130px;height:130px;border-radius:50%;border:1px solid var(--bd);position:absolute}
.breath-circle{width:70px;height:70px;border-radius:50%;background:var(--pu);display:flex;align-items:center;justify-content:center}
.breath-num{font-size:20px;font-weight:500;color:#fff;font-variant-numeric:tabular-nums}
.med-inst{font-size:16px;font-weight:500;color:var(--tx);text-align:center;margin-bottom:4px}
.med-sub{font-size:12px;color:var(--tx3);text-align:center;font-style:italic;margin-bottom:12px;min-height:16px}
.sarcasm{font-size:11px;color:var(--tx3);font-style:italic;text-align:center;margin-top:10px;min-height:16px}
.ck-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.ck-item:last-child{border-bottom:none}
.ck-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--tx3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.ck-box.on{background:var(--pu);border-color:var(--pu)}
.ck-main{font-size:13px;color:var(--tx)}
.ck-hint{font-size:11px;color:var(--tx3);font-style:italic;margin-top:1px}
.ck-item.done .ck-main{color:var(--tx3);text-decoration:line-through}
.q-num{font-size:11px;color:var(--pu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-weight:500}
.q-text{font-size:14px;font-weight:500;color:var(--tx);line-height:1.5;margin-bottom:4px}
.q-ctx{font-size:11.5px;color:var(--tx3);font-style:italic;margin-bottom:14px;line-height:1.4}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.opt{padding:10px 12px;border-radius:10px;border:1px solid var(--bd);background:var(--bg3);font-size:12.5px;color:var(--tx2);cursor:pointer;transition:all .15s;text-align:left;line-height:1.4;font-family:'DM Sans',sans-serif}
.opt:hover{border-color:var(--pu);color:var(--tx)}
.opt.selected{border-color:var(--pu);background:#c400ff12;color:var(--tx)}
.opt.correct{border-color:var(--ok);background:#0d2b1a;color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:#2d0a0a;color:var(--bad)}
.pause-item{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--pu)}
.pause-title{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:3px}
.pause-desc{font-size:12px;color:var(--tx2);line-height:1.55;margin-bottom:6px}
.eg-bad{font-size:12px;color:var(--bad);background:#2d0a0a;padding:6px 8px;border-radius:5px;margin-bottom:4px;line-height:1.4}
.eg-good{font-size:12px;color:var(--ok);background:#0d2b1a;padding:6px 8px;border-radius:5px;line-height:1.4}
.q-sim{font-size:14px;font-weight:500;color:var(--tx);line-height:1.55;padding:12px 14px;background:var(--bg3);border-radius:10px;border-left:3px solid var(--pu);margin-bottom:6px}
.q-ctx-sim{font-size:11px;color:var(--tx3);font-style:italic;margin-bottom:14px}
.timer-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.timer-num{font-size:20px;font-weight:500;color:var(--tx);font-variant-numeric:tabular-nums}
.wave-row{display:flex;align-items:center;gap:2px;height:32px;margin-bottom:10px;justify-content:center}
.wbar{width:3px;border-radius:2px;background:var(--pu);height:3px;transition:height .08s}
.transcript{min-height:70px;padding:10px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;font-size:12.5px;color:var(--tx2);line-height:1.7;margin-bottom:12px}
.interim{color:var(--tx3);font-style:italic}
.cursor{display:inline-block;width:2px;height:12px;background:var(--pu);animation:blink .8s infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px}
.ring{position:relative;width:40px;height:40px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring-n{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;font-weight:500;color:var(--tx)}
.m-lbl{font-size:10px;color:var(--tx3)}
.m-val{font-size:12px;font-weight:500;color:var(--tx)}
.star-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tip-box{padding:10px 12px;background:var(--bg3);border-radius:10px;border-left:3px solid var(--pu);font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:12px}
.tip-box strong{color:var(--tx);font-weight:500}
.spinner{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--pu);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.load-row{display:flex;align-items:center;gap:8px;padding:12px;background:var(--bg3);border-radius:10px;margin-bottom:10px;border:1px solid var(--bd)}
.done-circle{width:64px;height:64px;border-radius:50%;background:var(--pu);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff}
.story-box{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:14px;font-size:13px;color:var(--tx2);line-height:1.75;margin-bottom:14px;font-style:italic}
.star-verdict-btn{flex:1;padding:14px;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);transition:all .2s;text-align:center}
.star-verdict-btn:hover{transform:scale(1.02)}
.star-verdict-btn.yes{border-color:#4ade80;color:var(--ok)}
.star-verdict-btn.yes:hover{background:#0d2b1a}
.star-verdict-btn.no{border-color:var(--bad);color:var(--bad)}
.star-verdict-btn.no:hover{background:#2d0a0a}
.fb-box{border-radius:10px;padding:12px;font-size:12.5px;line-height:1.65;margin-bottom:10px}
.fb-correct{background:#0d2b1a;border:1px solid #166534;color:var(--ok)}
.fb-wrong{background:#2d0a0a;border:1px solid #7f1d1d;color:var(--bad)}
.missing-item{font-size:11.5px;color:var(--tx3);padding:3px 0;display:flex;align-items:flex-start;gap:6px}
.drag-pool{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.drag-piece{background:var(--bg3);border:1.5px solid var(--bd);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--tx2);cursor:grab;line-height:1.5;transition:all .15s;user-select:none}
.drag-piece:hover{border-color:var(--pu);color:var(--tx)}
.drag-piece.dragging{border-color:var(--pu);background:#c400ff12;opacity:.8;cursor:grabbing}
.drag-piece.placed{opacity:.4;cursor:default;pointer-events:none}
.drag-slots{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.drag-slot{border:1.5px dashed var(--bd);border-radius:10px;padding:10px 12px;min-height:70px;transition:all .2s;position:relative}
.drag-slot-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--pu);letter-spacing:.08em;margin-bottom:4px}
.drag-slot.drag-over{border-color:var(--pu);background:#c400ff08}
.drag-slot.filled{border-style:solid;border-color:var(--bd)}
.drag-slot.correct{border-color:var(--ok);background:#0d2b1a}
.drag-slot.wrong{border-color:var(--bad);background:#2d0a0a}
.slot-content{font-size:11.5px;color:var(--tx2);line-height:1.5}
.scenario-box{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid var(--warn)}
.scenario-label{font-size:10px;color:var(--warn);letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:4px}
.scenario-text{font-size:13px;color:var(--tx);line-height:1.55}
.scenario-ctx{font-size:11px;color:var(--tx3);font-style:italic;margin-top:4px}
.beh-opt{padding:12px 14px;border-radius:10px;border:1px solid var(--bd);background:var(--bg3);font-size:13px;color:var(--tx2);cursor:pointer;transition:all .15s;text-align:left;line-height:1.5;font-family:'DM Sans',sans-serif;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;width:100%}
.beh-opt:hover{border-color:var(--pu);color:var(--tx)}
.beh-opt.selected{border-color:var(--pu);background:#c400ff12}
.beh-opt.correct{border-color:var(--ok);background:#0d2b1a;color:var(--ok)}
.beh-opt.wrong{border-color:var(--bad);background:#2d0a0a;color:var(--bad)}
.beh-tag{flex-shrink:0;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--pu);margin-top:1px}
.star-example-box{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:10px}
.star-example-label{font-size:10px;color:var(--pu);letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:8px}
.star-row-ex{display:grid;grid-template-columns:1fr;gap:4px}
.star-el{font-size:12px;color:var(--tx2);line-height:1.55;padding:6px 8px;background:var(--bg3);border-radius:6px}
.star-el strong{color:var(--pu2)}
@media(max-width:480px){
  body{padding:8px}
  .cover-title,.cover-sub{font-size:28px}
  .drag-slots{grid-template-columns:1fr}
  .metrics-grid{grid-template-columns:1fr}
  .btn-row{flex-direction:column}
  .btn-row .btn{width:100%}
  .body-screen{padding:20px 16px}
  .module-screen{padding:16px}
  .dark-card{padding:12px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">ConnectUP</div>
    <div class="step-pills" id="step-pills">
      <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
    </div>
    <div class="time-badge" id="time-badge">25 min</div>
  </div>
  <div class="screen" id="main"></div>
</div>

<script>
const STEPS=['cover','welcome','med','check','diag','star-id','pausas','sim'];
let step=0,userName='';

const MED_PHASES=[{label:'Inhale',sub:'Through your nose, 4 seconds',dur:4},{label:'Hold',sub:'Purple Company does not exist for 4 seconds.',dur:4},{label:'Exhale',sub:'Through your mouth, 4 seconds',dur:4},{label:'Hold',sub:'Empty. Calm. Repeat.',dur:4}];
const MED_SARCASMS=['Purple Company HR breathes too. Sometimes.','Each exhale is an urgent email you haven\'t read.','Inhale confidence. Exhale self-doubt.','No meetings exist right now. Enjoy it.'];
let medTimer=60,medPhaseIdx=0,medPhaseTime=0,medPaused=false,medInt=null,medScaleInt=null;

const CHECKS=[{m:'Light in front of me, not behind',h:'Backlight = dark face = bad impression.'},{m:'Camera at eye level',h:'Laptop on the floor = unflattering angle. Use books.'},{m:'Headphones with microphone',h:'Built-in mic picks up everything. Headphones fix 80%.'},{m:'Quiet environment',h:'The senior analyst dog at Purple Company approves silence.'},{m:'Neutral, tidy background',h:'They judge. Everyone judges.'},{m:'Appropriate clothing on the upper half',h:'Purple Company has visual standards. Trust me.'},{m:'Phone on silent',h:'A delivery notification during a leadership question is unrecoverable.'},{m:'Water or coffee nearby',h:'Dry mouth happens. Purple Company will not wait.'}];
let checked={};

const DIAG_QS=[
  {t:'Purple Company asks "tell me about yourself". You:',c:'Most predictable interview question. Still the one that trips people up most.',o:[{t:'Start from the beginning — where I was born, went to school...',g:'delivery',w:3},{t:'I have an answer but sometimes lose track in the middle.',g:'delivery',w:2},{t:'Adapt to context, focus on what\'s relevant for the role.',g:null,w:0},{t:'Go blank and improvise.',g:'nerves',w:3}]},
  {t:'They ask for an example of when you solved a complex problem. You:',c:'They want evidence. Not intention. Not philosophy. Evidence.',o:[{t:'I have ready stories and know which one to use for each context.',g:null,w:0},{t:'I remember examples but my mind goes blank under pressure.',g:'nerves',w:2},{t:'I tell the story but my specific role isn\'t clear.',g:'delivery',w:3},{t:'I answer in general terms without a real example.',g:'delivery',w:4}]},
  {t:'The interviewer pauses and looks at you expecting you to keep going. You:',c:'Classic pressure technique. 70% of candidates self-sabotage here.',o:[{t:'I stay calm — I know it\'s part of the interview.',g:null,w:0},{t:'I start giving information I hadn\'t planned to give.',g:'nerves',w:4},{t:'I say "that\'s it" before I\'ve finished.',g:'nerves',w:3},{t:'I ask if I answered what they were looking for.',g:'nerves',w:1}]}
];
const GAP_INFO={delivery:{n:'Answer structure',d:'Your answers lose the thread. The STAR method is the only format that fixes this — each element anchors the narrative and prevents it from becoming a rambling monologue. You\'ll practice this now.'},nerves:{n:'Nerves management',d:'You know the answer but your nervous system hijacks your memory. The more you simulate the environment with real pressure, the less your brain treats the interview as a threat.'}};
let diagAns=[],diagQ=0,diagSel=null;

const STAR_ID_STORIES=[
  {text:'"I\'ve always been good at working with people and resolving conflicts. When there\'s disagreement on the team, I try to listen to both sides and stay neutral. At my previous company, everyone came to me when there was a problem between colleagues."',is_star:false,feedback:'Not STAR — and it\'s the answer HR hears 40 times a day. This is a generic self-description with no specific situation, no real context, no concrete action, and no measurable result. "I\'ve always been good at..." is the most dangerous phrase in an interview. HR will nod politely and forget you in 30 seconds.',missing:['Specific situation with real context','Task with clear stakes (what was at risk)','Concrete action — what YOU did (not "we")','Measurable result or observable change']},
  {text:'"At my last company, the deadline for a project was moved up by 3 weeks without notice. I was responsible for the client integration. I mapped the risks, prioritized the critical points with the product team, and directly negotiated removing two secondary features with the client. We delivered on time, within budget, and the client renewed the contract for another 12 months."',is_star:true,feedback:'This is STAR — well executed. Clear situation (deadline moved forward, with context), specific task (integration, defined responsibility), multi-step action with strong verbs (mapped, prioritized, negotiated), and result with business consequence (contract renewal). Suggestion: add the percentage of scope cut to make it even more precise.',present:['Situation with real pressure and context','Task with clear responsibility','Action in 3 steps with ownership verbs','Result with business impact']},
  {text:'"We had a big problem with a supplier who delayed delivery and affected our timeline. It was a very stressful period. But we got through it with teamwork and good communication. In the end everything was fine and the project was delivered."',is_star:false,feedback:'Not STAR — but disguised as a story. This is the most dangerous kind because it looks like a complete answer. "Everything worked out" is not a result. "Teamwork" is not an action. Where is YOUR role? What did YOU do? How many days delayed? What was the cost? Without specifics, HR hears noise.',missing:['What was YOUR specific role (not "we")','What you did concretely — actions with strong verbs','Measurable result (time, cost, quality)']}

const COMFORTS=['The dog is already judging you. Take your time typing your name.','25 minutes. No rush. No suit required. Just practice.','Purple Company doesn\'t exist. But the nerves are real. Let\'s work on that.','Do you have water? Coffee? Get some before we start.','HR is already in the room. The dog too. Breathe.'];

function goTo(s){step=STEPS.indexOf(s);render();updatePills();}
function updatePills(){
  const pills=document.querySelectorAll('.sp');

  const times={cover:'25 min',welcome:'25 min',med:'1 min',check:'1 min',diag:'3 min','star-id':'4 min',pausas:'3 min',sim:'13 min'};
  document.getElementById('time-badge').textContent=times[STEPS[step]]||'';
}
function render(){

}

function rWelcome(){

function checkName(){const v=document.getElementById('name-input').value.trim();document.getElementById('start-btn').disabled=!v;if(v){userName=v;document.getElementById('greeting').innerHTML=`Hello, <span>${v}</span>! Great to have you here.`;}else document.getElementById('greeting').innerHTML=`Hello! Great to have you here.`;}
function startSession(){const v=document.getElementById('name-input').value.trim();if(!v)return;userName=v;clearInterval(comfortInt);goTo('med');}

function rMed(){
  medTimer=60;medPhaseIdx=0;medPhaseTime=0;medPaused=false;clearInterval(medInt);clearInterval(medScaleInt);
  document.getElementById('main').innerHTML=`<div class="module-screen"><div class="mod-label">Module 1 — Breathing</div><div class="dark-card" style="text-align:center"><div class="sec-label" id="med-phase">get ready</div><div class="med-inst" id="med-inst">Close your eyes</div><div class="med-sub" id="med-sub">Starting in a moment...</div><div class="breath-wrap"><div class="breath-ring"></div><div class="breath-circle" id="breath-circle"><div class="breath-num" id="breath-num">—</div></div></div><div class="prog-bar"><div class="prog-fill" id="med-prog" style="width:100%"></div></div><div class="prog-time" id="med-time">1:00</div><div class="btn-row" style="justify-content:center"><button class="btn" id="med-pb" onclick="medToggle()">Pause</button><button class="btn" onclick="medSkip()">Skip</button></div><div class="sarcasm" id="med-s">${MED_SARCASMS[0]}</div></div></div>`;

function medStartPhase(){const p=MED_PHASES[medPhaseIdx%MED_PHASES.length];medPhaseTime=p.dur;const pe=document.getElementById('med-phase');if(pe)pe.textContent=p.label.toLowerCase();const ie=document.getElementById('med-inst');if(ie)ie.textContent=p.label;const se=document.getElementById('med-sub');if(se)se.textContent=p.sub;const ne=document.getElementById('breath-num');if(ne)ne.textContent=p.dur;medAnimCircle(p);}
function medAnimCircle(p){clearInterval(medScaleInt);const isIn=p.label==='Inhale',isH=p.label==='Hold';const s=isIn?.5:1,e=isIn?1:isH?1:.5;const steps=p.dur*20;let st=0;medScaleInt=setInterval(()=>{if(medPaused)return;st++;const v=s+(e-s)*(st/steps);const el=document.getElementById('breath-circle');if(el)el.style.transform=`scale(${v.toFixed(3)})`;if(st>=steps)clearInterval(medScaleInt);},50);}
function medTick(){if(medPaused)return;medTimer--;medPhaseTime--;const m=Math.floor(medTimer/60),s=medTimer%60;const te=document.getElementById('med-time');if(te)te.textContent=m+':'+(s<10?'0':'')+s;const pe=document.getElementById('med-prog');if(pe)pe.style.width=Math.round(medTimer/60*100)+'%';const ne=document.getElementById('breath-num');if(ne)ne.textContent=Math.max(1,medPhaseTime);if(medTimer<=0){clearInterval(medInt);clearInterval(medScaleInt);medDone();return;}if(medPhaseTime<=0){medPhaseIdx++;medStartPhase();if(Math.random()<.3){const se=document.getElementById('med-s');if(se)se.textContent=MED_SARCASMS[Math.floor(Math.random()*MED_SARCASMS.length)];}}}
function medToggle(){medPaused=!medPaused;const b=document.getElementById('med-pb');if(b)b.textContent=medPaused?'Resume':'Pause';}
function medSkip(){clearInterval(medInt);clearInterval(medScaleInt);medDone();}
function medDone(){clearInterval(medInt);clearInterval(medScaleInt);document.getElementById('main').innerHTML=`<div class="module-screen"><div class="dark-card" style="text-align:center;padding:32px 20px;margin-top:20px"><div class="done-circle">ok</div><div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--tx);margin-bottom:6px">Nervous system recalibrated.</div><div style="font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:20px">HR will think you do this all the time. Keep going, ${userName}.</div><button class="btn btn-main" onclick="goTo('check')">Next: checklist →</button></div></div>`;}

function ckToggle(i){checked[i]=!checked[i];document.getElementById('cki-'+i).classList.toggle('done',checked[i]);document.getElementById('ckb-'+i).classList.toggle('on',checked[i]);document.getElementById('ckt-'+i).style.display=checked[i]?'block':'none';const done=Object.values(checked).filter(Boolean).length;document.getElementById('ck-c').textContent=done;const pct=Math.round(done/8*100);document.getElementById('ck-bar').style.width=pct+'%';document.getElementById('ck-pct').textContent=pct+'%';document.getElementById('ck-btn').disabled=done<6;}

  if(!s.is_star&&s.missing){html+=`<div style="margin-bottom:10px"><div style="font-size:10px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">What's missing</div>${s.missing.map(m=>`<div class="missing-item"><span style="color:var(--bad)">✕</span><span>${m}</span></div>`).join('')}</div>`;}
  if(s.is_star&&s.present){html+=`<div style="margin-bottom:10px"><div style="font-size:10px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">What's right</div>${s.present.map(m=>`<div class="missing-item"><span style="color:var(--ok)">✓</span><span>${m}</span></div>`).join('')}</div>`;}
  html+=`<button class="btn btn-main" onclick="starIdNext()">${starIdQ<STAR_ID_STORIES.length-1?'Next story →':'See result →'}</button></div></div>`;
  document.getElementById('main').innerHTML=html;
}

function rPausas(){

function rSimNext(){
  if(simQIdx>=SIM_QUEUE.length){rSimDone();return;}
  const item=SIM_QUEUE[simQIdx];
  if(item.type==='record')rSimRecord(item.idx);
  else if(item.type==='behavioral')rBehavioral(item.idx);
  else if(item.type==='star-drag')rStarDrag(item.idx);
}
function simProgress(){return`${simQIdx+1}/${SIM_QUEUE.length}`;}

function rSimRecord(idx){
  simTimer=120;simPaused=false;simCharIdx=0;
  clearInterval(simTInt);clearInterval(simWInt);clearInterval(simTrInt);
  const q=SIM_RECORD_QS[idx];
  document.getElementById('main').innerHTML=`<div class="module-screen"><div class="mod-label">Module 6 — Simulator · ${simProgress()}</div><div class="dark-card"><div class="prog-bar" style="margin-bottom:12px"><div class="prog-fill" style="width:${Math.round(simQIdx/SIM_QUEUE.length*100)}%"></div></div><div class="q-sim">${q.q}</div><div class="q-ctx-sim">${q.ctx}</div><div class="timer-row"><div class="timer-num" id="s-timer">2:00</div><div class="prog-bar" style="flex:1;margin:0 10px"><div class="prog-fill" id="s-tfill" style="width:100%"></div></div><div class="pill pill-gray" id="s-status">Waiting</div></div><div class="wave-row" id="s-wave">${Array(24).fill('<div class="wbar"></div>').join('')}</div><div class="transcript" id="s-tr"><span style="color:var(--tx3)">Click "Start" and speak your answer...</span></div><div class="btn-row"><button class="btn btn-main" id="s-start" onclick="sStart(${idx})">Start recording</button><button class="btn" id="s-pause" onclick="sPause()" style="display:none">Pause</button><button class="btn" style="background:#2d0a0a;color:var(--bad);border-color:#7f1d1d;display:none" id="s-stop" onclick="sStop(${idx})">Stop & evaluate</button></div></div></div>`;
}
function sStart(idx){
  simCharIdx=0;simPaused=false;
  const full=SIM_RECORD_QS[idx].t;
  document.getElementById('s-start').style.display='none';
  document.getElementById('s-pause').style.display='inline-block';
  document.getElementById('s-stop').style.display='inline-block';
  document.getElementById('s-status').className='pill pill-pu';
  document.getElementById('s-status').textContent='Recording';
  document.getElementById('s-tr').innerHTML='<span class="cursor"></span>';
  if(window.SpeechRecognition||window.webkitSpeechRecognition){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    window._rec=new SR();window._rec.lang='en-US';window._rec.continuous=true;window._rec.interimResults=true;
    let final='';
    window._rec.onresult=e=>{let interim='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript+' ';else interim+=e.results[i][0].transcript;}const el=document.getElementById('s-tr');if(el)el.innerHTML=final+(interim?`<span class="interim">${interim}</span>`:'')+`<span class="cursor"></span>`;};
    window._rec.onerror=()=>{startSimulated(full);};
    window._rec.onend=()=>{if(!simPaused&&simCharIdx<9999&&window._rec)window._rec.start();};
    window._rec.start();
  } else {
    const el=document.getElementById('s-tr');
    if(el)el.innerHTML='<span style="color:#fbbf24;font-size:12px;">⚠ Speech recognition not supported in this browser (use Chrome or Edge). Demo mode activated.</span><span class="cursor"></span>';
    startSimulated(full);
  }
  simWInt=setInterval(()=>{if(!simPaused)document.querySelectorAll('.wbar').forEach(b=>{b.style.height=Math.round(3+Math.random()*24)+'px';});},80);
  simTInt=setInterval(()=>{if(!simPaused){simTimer--;const m=Math.floor(simTimer/60),s=simTimer%60;const te=document.getElementById('s-timer');if(te)te.textContent=m+':'+(s<10?'0':'')+s;const fe=document.getElementById('s-tfill');if(fe)fe.style.width=Math.round(simTimer/120*100)+'%';if(simTimer<=0)sStop(idx);}},1000);
}
function startSimulated(full){simTrInt=setInterval(()=>{if(!simPaused&&simCharIdx<full.length){simCharIdx+=Math.round(1+Math.random()*3);const cf=full.slice(0,Math.max(0,simCharIdx-8)),it=full.slice(Math.max(0,simCharIdx-8),simCharIdx);const el=document.getElementById('s-tr');if(el)el.innerHTML=cf+(it?`<span class="interim">${it}</span>`:'')+`<span class="cursor"></span>`;}},60);}
function sPause(){simPaused=!simPaused;if(window._rec){if(simPaused)window._rec.stop();else window._rec.start();}const b=document.getElementById('s-pause');if(b)b.textContent=simPaused?'Resume':'Pause';document.getElementById('s-status').className=simPaused?'pill pill-warn':'pill pill-pu';document.getElementById('s-status').textContent=simPaused?'Paused':'Recording';if(simPaused)document.querySelectorAll('.wbar').forEach(b=>b.style.height='3px');}
function sStop(idx){
  clearInterval(simTInt);clearInterval(simWInt);clearInterval(simTrInt);
  if(window._rec){window._rec.stop();window._rec=null;}
  simPaused=false;document.querySelectorAll('.wbar').forEach(b=>b.style.height='3px');
  document.getElementById('main').innerHTML=`<div class="module-screen"><div class="dark-card" style="margin-top:10px"><div class="load-row"><div class="spinner"></div><div id="lm" style="font-size:13px;color:var(--tx2)">Processing transcript...</div></div><div class="prog-bar"><div class="prog-fill" id="lb" style="width:0%;transition:width .5s"></div></div></div></div>`;
  const msgs=['Analyzing STAR method...','Detecting generic answers...','Checking if you blamed the intern...','Calculating score...'];
  let i=0;const iv=setInterval(()=>{i++;const m=document.getElementById('lm');if(m&&i<=msgs.length)m.textContent=msgs[i-1];const b=document.getElementById('lb');if(b)b.style.width=Math.round(i/msgs.length*100)+'%';},500);
  setTimeout(()=>{clearInterval(iv);sShowFb(idx);},2400);
}
function sShowFb(idx){
  const q=SIM_RECORD_QS[idx];
  const tx=(document.getElementById('s-tr')?.innerText?.replace(/\n/g,' ')?.trim())||q.t;
  const hS=/situation|project|client|deadline|company|team|problem|context/i.test(tx);
  const hT=/responsible|my role|needed|task|objective|ensure|my area/i.test(tx);
  const hA=/created|proposed|built|mapped|talked|asked|showed|documented|organized|presented|led|implemented|negotiated/i.test(tx);
  const hR=/result|improved|changed|reduced|we delivered|client.*approved|contract|nps|passed|after that|in \d/i.test(tx);
  const hasNumber=/\d+/.test(tx);
  const hasGeneric=/i'm very|i've always been|i work well in teams|communication|dedic/i.test(tx);
  const hasWe=/\bwe\b/i.test(tx)&&!/\bi\b|\bmy\b|\bmine\b/i.test(tx);

  let base=42;
  const conteudo=Math.min(96,base+(hS?12:0)+(hA?14:0)+(hR?16:0)+(hasNumber?8:0)-(hasGeneric?18:0)-(hasWe?10:0)+Math.round(Math.random()*6));
  const star=Math.min(96,base+(hS?14:0)+(hT?13:0)+(hA?14:0)+(hR?14:0)-(hasGeneric?15:0)+Math.round(Math.random()*4));
  const especificidade=Math.min(96,base+(hasNumber?20:0)+(hA?10:0)+(hR?12:0)-(hasGeneric?20:0)+Math.round(Math.random()*8));
  const ritmo=Math.min(96,60+Math.round(Math.random()*28)-(hasWe?8:0));
  const ov=Math.round((conteudo+star+especificidade+ritmo)/4);
  const lb={conteudo:'Content',star:'STAR',especificidade:'Specificity',ritmo:'Delivery'};
  const sc={conteudo,star,especificidade,ritmo};
  const si=['Situation','Task','Action','Result'],hi=[hS,hT,hA,hR];
  const vd={
    low:`${userName}, this goes back to the draft. Generic answers are invisible to recruiters.`,
    med:`${userName}, there's structure, but it lacks substance. HR has heard this before.`,
    good:`${userName}, solid answer. HR was pleasantly surprised.`,
    great:`${userName}, this is Purple Company certified. The senior analyst dog approved unanimously.`
  };
  const verdict=ov<55?vd.low:ov<70?vd.med:ov<85?vd.good:vd.great;
  const tipMsg=!hR?'Always close with the <strong>result</strong>. What changed? By how much? Without a result, the story doesn\'t exist for the recruiter.':!hA?'Make it clear what YOU did — avoid "we" without specifying your role. Use ownership verbs: created, proposed, mapped, negotiated.':hasGeneric?'We detected a generic answer. "I\'m very committed" and similar phrases cost you points. Replace with concrete evidence.':'Good answer! To reach 95+: add a number (%, days, value) and connect it to the business impact.';

  document.getElementById('main').innerHTML=`<div class="module-screen"><div class="mod-label">Recording ${simProgress()} — Feedback</div><div class="dark-card"><div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px"><div style="font-family:'Syne',sans-serif;font-size:36px;font-weight:700;color:${ov>=80?'var(--ok)':ov>=60?'var(--warn)':'var(--bad)'}">${ov}%</div><div style="font-size:11px;color:var(--tx3)">overall score</div></div><div style="font-size:12.5px;color:var(--tx2);margin-bottom:14px">${verdict}</div><div class="metrics-grid">${Object.entries(sc).map(([k,v])=>{const r=17,c=2*Math.PI*r,d=c*(1-v/100);const col=v>=80?'var(--ok)':v>=60?'var(--warn)':'var(--bad)';return`<div class="metric"><div class="ring"><svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="${r}" fill="none" stroke="var(--bd)" stroke-width="3"/><circle cx="20" cy="20" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${d.toFixed(1)}" stroke-linecap="round"/></svg><div class="ring-n">${v}%</div></div><div><div class="m-lbl">${lb[k]}</div><div class="m-val" style="color:${col}">${v>=80?'Great':v>=60?'OK':'Weak'}</div></div></div>`;}).join('')}</div><div class="star-row">${si.map((s,i)=>`<span class="pill ${hi[i]?'pill-ok':'pill-bad'}">${s}</span>`).join('')}</div><div class="tip-box"><strong>Critical feedback:</strong> ${tipMsg}</div><div class="btn-row"><button class="btn btn-main" onclick="simAdvance()">Next →</button><button class="btn" onclick="rSimRecord(${idx})">Retry</button></div></div></div>`;
}

function rBehavioral(idx){
  behQ=idx;behSel=null;behAnswered=false;
  const q=BEHAVIORAL_QS[idx];
  document.getElementById('main').innerHTML=`<div class="module-screen"><div class="mod-label">Module 6 — Simulator · ${simProgress()}</div><div class="dark-card"><div class="prog-bar" style="margin-bottom:12px"><div class="prog-fill" style="width:${Math.round(simQIdx/SIM_QUEUE.length*100)}%"></div></div><div class="scenario-box"><div class="scenario-label">Purple Company Scenario</div><div class="scenario-text">${q.scenario}</div><div class="scenario-ctx">${q.ctx}</div></div><div class="q-num" style="margin-bottom:8px">${q.question}</div>${q.options.map((o,i)=>`<button class="beh-opt" id="bopt-${i}" onclick="behSelect(${i})"><span class="beh-tag">${o.tag}</span><span>${o.text}</span></button>`).join('')}<button class="btn btn-main" id="beh-confirm" onclick="behConfirm()" disabled>Confirm answer</button></div></div>`;
}
function behSelect(i){behSel=i;document.querySelectorAll('.beh-opt').forEach((b,j)=>b.classList.toggle('selected',j===i));document.getElementById('beh-confirm').disabled=false;}
function behConfirm(){
  if(behSel===null||behAnswered)return;
  behAnswered=true;
  const q=BEHAVIORAL_QS[behQ];
  const chosen=q.options[behSel];
  document.querySelectorAll('.beh-opt').forEach((b,i)=>{
    const o=q.options[i];
    b.classList.remove('selected');
    if(o.correct)b.classList.add('correct');
    else if(i===behSel)b.classList.add('wrong');
    b.disabled=true;
  });
  document.getElementById('beh-confirm').style.display='none';
  const scoreColor=chosen.score>=80?'var(--ok)':chosen.score>=50?'var(--warn)':'var(--bad)';
  const starHtml=`<div class="star-example-box"><div class="star-example-label">How it would look using STAR</div><div class="star-row-ex">${q.star_example.map(e=>`<div class="star-el"><strong>${e.l} —</strong> ${e.t}</div>`).join('')}</div></div>`;
  const card=document.querySelector('.dark-card');
  card.insertAdjacentHTML('beforeend',`<div class="fb-box ${chosen.correct?'fb-correct':'fb-wrong'}" style="margin-top:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:${scoreColor}">${chosen.score}%</span><span style="font-size:12px;color:var(--tx3)">· option ${chosen.tag}</span></div>${chosen.feedback}</div>${starHtml}<button class="btn btn-main" style="margin-top:6px" onclick="simAdvance()">Next →</button>`);
}

function rStarDrag(idx){
  dragIdx=idx;slotAssignments={};selectedPiece=null;
  const set=STAR_DRAG_SETS[idx];
  const shuffled=[...set.pieces].sort(()=>Math.random()-.5);
  document.getElementById('main').innerHTML=`<div class="module-screen"><div class="mod-label">Module 6 — Simulator · ${simProgress()}</div><div class="dark-card"><div class="prog-bar" style="margin-bottom:12px"><div class="prog-fill" style="width:${Math.round(simQIdx/SIM_QUEUE.length*100)}%"></div></div><div class="q-num" style="margin-bottom:8px">${set.intro}</div><div style="font-size:11px;color:var(--tx3);margin-bottom:12px">Click a piece → then click the correct slot. Or drag.</div><div class="drag-slots"><div class="drag-slot" id="slot-S" data-slot="S" onclick="slotClick('S')"><div class="drag-slot-label">S — Situation</div><div class="slot-content" id="sc-S"></div></div><div class="drag-slot" id="slot-T" data-slot="T" onclick="slotClick('T')"><div class="drag-slot-label">T — Task</div><div class="slot-content" id="sc-T"></div></div><div class="drag-slot" id="slot-A" data-slot="A" onclick="slotClick('A')"><div class="drag-slot-label">A — Action</div><div class="slot-content" id="sc-A"></div></div><div class="drag-slot" id="slot-R" data-slot="R" onclick="slotClick('R')"><div class="drag-slot-label">R — Result</div><div class="slot-content" id="sc-R"></div></div></div><div class="drag-pool" id="drag-pool">${shuffled.map(p=>`<div class="drag-piece" id="dp-${p.id}" data-id="${p.id}" draggable="true" onclick="pieceClick('${p.id}')">${p.text}</div>`).join('')}</div><button class="btn btn-main" id="drag-check" onclick="checkDrag()" disabled>Check →</button></div></div>`;
  document.querySelectorAll('.drag-piece').forEach(el=>{
    el.addEventListener('dragstart',e=>{selectedPiece=el.dataset.id;el.style.opacity='.5';});
    el.addEventListener('dragend',e=>{el.style.opacity='1';});
  });
  document.querySelectorAll('.drag-slot').forEach(slot=>{
    slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drag-over');});
    slot.addEventListener('dragleave',()=>slot.classList.remove('drag-over'));
    slot.addEventListener('drop',e=>{e.preventDefault();slot.classList.remove('drag-over');if(selectedPiece){placePiece(selectedPiece,slot.dataset.slot);selectedPiece=null;}});
  });
}
function pieceClick(id){
  if(selectedPiece===id){selectedPiece=null;document.querySelectorAll('.drag-piece').forEach(p=>p.classList.remove('dragging'));}
  else{selectedPiece=id;document.querySelectorAll('.drag-piece').forEach(p=>p.classList.toggle('dragging',p.dataset.id===id));}
}
function slotClick(slotName){if(selectedPiece){placePiece(selectedPiece,slotName);selectedPiece=null;document.querySelectorAll('.drag-piece').forEach(p=>p.classList.remove('dragging'));}}
function placePiece(pieceId,slotName){
  const set=STAR_DRAG_SETS[dragIdx];
  const piece=set.pieces.find(p=>p.id===pieceId);if(!piece)return;
  Object.keys(slotAssignments).forEach(k=>{if(slotAssignments[k]===pieceId)delete slotAssignments[k];});
  const displaced=slotAssignments[slotName];
  if(displaced){const dpEl=document.getElementById('dp-'+displaced);if(dpEl){dpEl.classList.remove('placed');document.getElementById('drag-pool').appendChild(dpEl);}}
  slotAssignments[slotName]=pieceId;
  const pieceEl=document.getElementById('dp-'+pieceId);if(pieceEl){pieceEl.classList.add('placed');}
  const sc=document.getElementById('sc-'+slotName);if(sc)sc.textContent=piece.text;
  document.getElementById('slot-'+slotName).classList.add('filled');
  const filled=Object.keys(slotAssignments).length;
  document.getElementById('drag-check').disabled=filled<4;
}
function checkDrag(){
  const set=STAR_DRAG_SETS[dragIdx];
  let correct=0;
  ['S','T','A','R'].forEach(slot=>{
    const pieceId=slotAssignments[slot];
    const piece=set.pieces.find(p=>p.id===pieceId);
    const slotEl=document.getElementById('slot-'+slot);
    if(piece&&piece.slot===slot){correct++;slotEl.classList.add('correct');}
    else{slotEl.classList.add('wrong');}
  });
  const pct=Math.round(correct/4*100);
  const card=document.querySelector('.dark-card');
  const msg=correct===4?'Perfect — you assembled the STAR correctly. That\'s exactly what the recruiter wants to hear in your spoken answer.':correct>=3?'Almost. One element out of place — but the overall structure is right.':correct>=2?'Half right. Review: Situation is the context, Task is your role, Action is what you did, Result is the impact.':'Let\'s review the STAR method together. Situation → Task → Action → Result. Try again.';
  card.insertAdjacentHTML('beforeend',`<div class="fb-box ${correct===4?'fb-correct':'fb-wrong'}" style="margin-top:10px"><strong>${correct}/4 correct (${pct}%)</strong><br><br>${msg}</div><div class="btn-row" style="margin-top:8px"><button class="btn btn-main" onclick="simAdvance()">Next →</button>${correct<4?`<button class="btn" onclick="rStarDrag(${dragIdx})">Try again</button>`:''}</div>`);
  document.getElementById('drag-check').style.display='none';
}
function simAdvance(){simQIdx++;rSimNext();}

function rSimDone(){
  document.getElementById('main').innerHTML=`<div class="module-screen"><div class="dark-card" style="text-align:center;padding:32px 20px;margin-top:10px"><div class="done-circle">25'</div><div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--tx);margin-bottom:6px">Session complete, ${userName}.</div><div style="font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:6px">You went through breathing, checklist, diagnosis, STAR identification, story drag, absurd behavioral questions, and real recordings with critical feedback.</div><div style="font-size:12px;color:var(--tx3);font-style:italic;margin-bottom:24px">Purple Company is going to have to work very hard not to hire you. The senior analyst dog approved unanimously.</div><div class="btn-row" style="justify-content:center"><button class="btn btn-main" onclick="step=0;userName='';render();updatePills()">Restart session</button><button class="btn" onclick="startSim()">Just the simulator</button></div></div></div>`;
  document.querySelectorAll('.sp').forEach(p=>p.className='sp done');
}

step=0;render();updatePills();

function reportHeight(){
  var main=document.getElementById('main');
  var h=main?main.scrollHeight+57:document.body.scrollHeight;
  if(window.parent!==window)window.parent.postMessage({type:'sim-height',height:h},'*');
}
var _ro=new MutationObserver(reportHeight);
_ro.observe(document.getElementById('main'),{childList:true,subtree:true,characterData:true});
window.addEventListener('load',reportHeight);
reportHeight();
</script>
</body>
</html>
