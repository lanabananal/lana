[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Root redirect → English
[[redirects]]
  from = "/"
  to = "/en/"
  status = 301

# Cache static assets for 1 year
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 1 year
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Cache fonts
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — short cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Security headers on all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Allow tool pages to be embedded as iframes on the same domain
# Both .html and pretty-URL paths covered — Netlify may serve either
[[headers]]
  for = "/simulador-entrevista.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/simulador-entrevista"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/interview-simulator.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/interview-simulator"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/calculadora-fiscal.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/calculadora-fiscal"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/ats-evaluator.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/ats-evaluator"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/ats-evaluator-en.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/ats-evaluator-en"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
